image: node:18.17.1

stages:
  - build
  - lint
  - test
  - publish

dependencies:
  stage: build
  script:
    - yarn install --frozen-lockfile
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 week

lint:
  stage: lint
  script:
    - yarn lint

test:
  image: docker:stable
  stage: test
  script:
    - test:docker

publish:
  stage: publish
  before_script:
    - git config --global user.email "bouhelalhamza@gmail.com"
    - git config --global user.name "bouhelalhamza"
  script:
    - yarn release "$CI_COMMIT_MESSAGE"
  only:
    - master
  except:
    - /^no-release.*$/
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
    when: always
